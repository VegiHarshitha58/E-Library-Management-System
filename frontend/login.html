<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Library Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:url('images/library.jpeg') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    width:90%;
    max-width:1200px;
    height:90vh;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    padding-left:120px;
    border-radius:8px;
}

.login-box{
    width:100%;
    max-width:350px;
    color:white;
}

.login-box h1{
    font-size:50px;
    font-weight:300;
    margin-bottom:10px;
}

.login-box p{
    margin-bottom:40px;
    color:#ddd;
}

.input-group{
    margin-bottom:20px;
    position:relative;
}

.input-group input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid white;
    padding:10px 35px 10px 0;
    color:white;
    outline:none;
    font-size:15px;
}

.input-group input::placeholder{
    color:#ddd;
}

.toggle-password{
    position:absolute;
    right:5px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
    color:white;
}

.remember{
    margin-bottom:20px;
    font-size:14px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    background:#1976d2;
    color:white;
    cursor:pointer;
    border-radius:3px;
    font-size:16px;
    transition:0.3s;
}

.btn:hover{
    background:#0d5db8;
    transform:translateY(-2px);
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
    font-size:12px;
}

.links a{
    color:white;
    text-decoration:none;
    display:block;
    margin-bottom:8px;
    transition:0.3s;
}

.links a:hover{
    color:#4da3ff;
    transform:translateX(5px);
}

@media(max-width:768px){

    .overlay{
        padding:30px;
        justify-content:center;
    }

    .login-box{
        max-width:100%;
    }

    .login-box h1{
        font-size:40px;
    }
}

</style>

</head>
<body>

<div class="overlay">

<div class="login-box">

<h1>Welcome!</h1>

<p>Your Digital Library Awaits</p>

<form id="loginForm">

<div class="input-group">
<input
type="text"
id="username"
placeholder="Email"
required>
</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="Password"
required>

<span
class="toggle-password"
onclick="togglePassword()">

<i class="fa-solid fa-eye-slash"></i>

</span>

</div>

<div class="remember">
<input type="checkbox">
Remember Me
</div>

<button
type="submit"
class="btn"
id="loginBtn">
LOGIN
</button>

</form>

<div class="links">

<div>
<a href="#">Change Password</a>
<a href="#">Manage Profile</a>
</div>

<div>
<a href="#">Forgot Password</a>
<a href="register.html">Create Account</a>
</div>

</div>

</div>

</div>

<script>

function togglePassword(){

    let password =
    document.getElementById("password");

    let eyeIcon =
    document.querySelector(".toggle-password i");

    if(password.type === "password"){

        password.type = "text";

        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");

    }else{

        password.type = "password";

        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    }
}

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const username =
    document.getElementById("username").value.trim();

    const password =
    document.getElementById("password").value;

    if(username === "" || password === ""){

        alert("Please fill all fields");
        return;
    }

    const btn =
    document.getElementById("loginBtn");

    btn.innerHTML = "Logging In...";
    btn.disabled = true;

    try{

        const response = await fetch(
            "http://localhost:5000/login",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    username,
                    password
                })
            }
        );

        const data =
        await response.text();

        if(data === "Login Successful"){

            alert("Login Successful");

        }else{

            alert(data);
        }

    }
    catch(error){

        alert("Server Connection Failed");

        console.log(error);
    }

    btn.innerHTML = "LOGIN";
    btn.disabled = false;

});

</script>

</body>
</html>
