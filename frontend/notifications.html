<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - E-Library</title>

<link rel="stylesheet" href="notifications.css">
</head>

<body>

<header>

<div class="logo">
📚 E-Library
</div>

<nav>
<a href="home.html">Home</a>
<a href="categories.html">Categories</a>
<a href="contributors.html">Contributors</a>
<a href="notifications.html">Notifications</a>
</nav>

</header>

<section class="hero">

<div class="hero-content">

<span class="tag">
🔔 UPDATES
</span>

<h1>Notifications</h1>

<p>
Stay updated with new uploads, contributors,
research papers, and library announcements.
</p>

</div>

</section>

<section class="notifications" id="notificationsContainer">

</section>
<script>

fetch("http://localhost:5000/notifications")

.then(response => response.json())

.then(data => {

    const container =
    document.getElementById("notificationsContainer");

    container.innerHTML = "";

    data.forEach(item => {

        container.innerHTML += `

        <div class="notification-card">

            <h3>🔔 Notification</h3>

            <p>${item.message}</p>

            <span>${item.created_at}</span>

        </div>

        `;

    });

})

.catch(error => {

    console.error(error);

});

</script>

</body>
</html>
